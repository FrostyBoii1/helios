brand_only_aliases:
  - source: "Longi"
    brand: "LONGi Solar"
    action: preserve_brand_only_model_null_unless_derivable
  - source: "AE Solar"
    brand: "AE Solar"
    action: preserve_brand_only_model_null_unless_derivable
  - source: "AE panels"
    brand: "AE Solar"
    action: preserve_brand_only_model_null_unless_derivable
  - source: "AE"
    brand: "AE Solar"
    action: preserve_brand_only_model_null_unless_derivable
  - source: "TW"
    brand: "Tongwei Solar"
    action: preserve_brand_only_model_null_unless_derivable
    confidence: manual_review
    reason: "Short brand-only shorthand is risky without wattage/system-size evidence."


wattage_only_policy:
  preserve_wattage_without_brand: true
  do_not_guess_brand_from_wattage_only: true
  examples:
    - source: "440W panels"
      display_name: "440W panels"
      brand: null
      model: null
      wattage_w: 440
      confidence: unconfirmed_raw_text
