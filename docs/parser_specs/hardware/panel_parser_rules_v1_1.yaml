version: panel_rules_v1_1
hardware_type: panel

policy:
  source_data_trust:
    sheet_data: imported_evidence_not_truth
    proposal_nas_data: more_authoritative_when_available
  model_field_rule: "model must be null unless an actual catalogue model is confidently identified"
  brand_optional: true
  quantity_already_parsed: true
  parser_must_not_extract_quantity_in_this_pass: true
  panel_fields_are_editable_textboxes: true
  manual_edits_must_not_be_overwritten_without_confirmation: true
  source_fragment_required: true
  parser_owned_required: true
  parser_rule_version_required: true
  wattage_derivation_tolerance_w: 2
  panel_array_kw_formula: "panel_quantity * wattage_w / 1000"
  conflict_rule: "proposal/NAS wins over sheet, but sheet source_fragment must be preserved"
  strict_ignore_values:
    - "-"
    - "/"
    - "N/A"
    - "na"
  routed_destinations:
    - internal_note
    - review_evidence
    - accessory_hardware_candidate
    - battery_hardware_candidate
    - optimiser_candidate
    - manual_review
  non_panel_ambiguous_values:
    - value: "AE 440 or TW"
      action: preserve_not_panel
      routed_destination: review_evidence
      reason: multiple_possible_panel_brands
    - value: "TO AE PANELS"
      action: preserve_not_panel
      routed_destination: internal_note
      reason: admin_or_procurement_note
    - value: "3 x tigo Optimisers"
      action: preserve_not_panel
      routed_destination: optimiser_candidate
      reason: optimiser_accessory_not_panel
    - value: "Ben installed"
      action: preserve_not_panel
      routed_destination: internal_note
      reason: installation_note_not_panel
    - value: "2 x batteries"
      action: preserve_not_panel
      routed_destination: battery_hardware_candidate
      reason: battery_note_not_panel
    - value: "ALPHA ESS 10KW"
      action: preserve_not_panel
      routed_destination: battery_hardware_candidate
      reason: battery_or_inverter_hardware_not_panel
    - value: "Alpha ESS SMILE-BAT-13.3P"
      action: preserve_not_panel
      routed_destination: battery_hardware_candidate
      reason: battery_hardware_not_panel

confidence_levels:
  - exact
  - alias
  - derived_from_system_size
  - proposal_overrode_sheet
  - unconfirmed_raw_text
  - manual_review

confidence_policy:
  confidence_describes_certainty_not_category: true
  invalid_confidence_examples:
    - accessory_hardware
  use_routed_destination_for_category: true

