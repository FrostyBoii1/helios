schema_version: hardware_parser_runtime_schema_v8
rule_intent: Implementation-ready runtime rules. Markdown is readable spec only; this YAML is the runtime source for v1.
source_examples_policy: source_examples are evidence and fixture material only. They must not be loaded into exact, loose,
  or fuzzy alias matchers unless manually promoted into exact_aliases or loose_aliases.
required_parsed_item_fields:
- model
- quantity
- confidence
- parser_owned
- source_fragment
global_guard_phrases:
  phrases:
  - used
  - reusing
  - old
  - existing
  - going back on
  - customer supplied
  - install only
  default_action: do_not_infer_model_from_guarded_text
  allow_if_specific_correction: true
  specific_corrections_override_guard_phrases: true
workflow_boundary:
  hardware_parser_extracts_hardware_only: true
  do_not_infer_approval_status: true
  do_not_create_tasks: true
  do_not_apply_workflow_labels: true
  workflow_rules_may_use_parsed_hardware_later_but_are_separate: true
acceptance_gates:
  runtime_yaml_parses: true
  schema_validates: true
  catalogue_ids_unique: true
  aliases_collision_checked: true
  source_examples_ignored_by_alias_matcher: true
  every_fixture_passes: true
  unknown_hardware_preserved_not_guessed: true
  manual_edits_not_overwritten: true
  parser_version_stored: true
  source_fragments_preserved: true
  full_backend_suite_green: true
source_metadata:
  required_fields_on_parse:
  - source_type
  - source_field
  - source_fragment
  source_type_allowed:
  - workbook
  - nas_file
  - manual
  - document_name
  - ocr_text
  - unknown
  source_field_allowed:
  - inverter
  - hardware
  - notes
  - document_name
  - ocr_text
  - unknown
  purpose: Allows future workbook/NAS/manual sources to be debugged without changing parsed hardware semantics.
fixture_expected_output_defaults:
  inverters: []
  batteries: []
  metering: []
  site_notes:
    ct: []
    export_limit: []
    underground: []
    comms: []
    raw_misc: []
  job_internal_notes_display: []
  ignored: false
  warnings: []
alias_collision_validation:
  required: true
  blocking_conditions:
  - same exact_alias maps to more than one catalog item
  - same loose_alias maps to more than one catalog item unless represented only as an ambiguous_raw_text_example
  - same normalized alias exists in both exact_aliases and loose_aliases
  - source_examples loaded into alias matcher
  - specific_corrections.output references missing canonical models
  required_result_before_implementation: zero_blocking_collisions
aggregation_rules:
  same_model_same_confidence_same_source_class: aggregate_quantity_into_one_item
  preserve_source_fragments: store all contributing fragments as source_fragments if aggregation occurs
  do_not_aggregate: Different models, different confidence levels, or materially different source fragments remain separate
    items.
ordering_rules:
  inverters: source_order
  batteries: source_order
  metering: source_order
  site_notes: source_order_within_each_note_bucket
  reason: Stable output order prevents flaky tests and unstable UI diffs.
hardware_database_scope_v1: v1 loads parser runtime rules from YAML. Do not build the full editable hardware catalogue UI/database
  unless explicitly scoped separately.
nas_boundary_future:
  workbook_parser: extracts claimed hardware
  nas_parser: extracts evidence/document categories later
  nas_evidence_may_confirm_or_challenge_hardware: true
  nas_must_not_silently_overwrite_workbook_or_manual_hardware: true
review_required_handling:
  unknown_inverter_fragment: place raw fragment into inverters[].model with confidence unconfirmed_raw_text/manual_review
    as appropriate
  unknown_battery_fragment: place raw fragment into batteries[].model with confidence unconfirmed_raw_text/manual_review as
    appropriate
  non_hardware_misc: place relevant fragment in site_notes.raw_misc
  warnings_required: true
  never_guess_closest_model: true
ambiguous_raw_text_examples:
- Solax 5kw
- Solax 10kw
- Goodwe 10kw
- Sungrow 5kw
- Solis 5kw
