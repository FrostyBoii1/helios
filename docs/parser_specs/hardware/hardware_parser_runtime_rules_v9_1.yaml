version: hardware_parser_runtime_rules_v9_validation_clean
encoding_policy:
  normalise_mojibake: true
  replace:
    ×: ×
    ·: ·
  ascii_safe_equivalents:
    ×: x
    ·: '-'
output_shape:
  inverters: []
  batteries: []
  metering: []
  site_notes:
    ct: []
    export_limit: []
    underground: []
    comms: []
    raw_misc: []
  job_internal_notes_display: []
  raw_evidence: null
  parser_rule_version: hardware_parser_rules_v8
confidence_levels:
- exact
- alias
- inferred_from_capacity
- unconfirmed_raw_text
- manual_review
- manual_correction
parser_priority_order:
- normalise_text_encoding
- extract_quantities
- extract_full_raw_test_fixture_matches
- extract_batteries
- extract_metering
- extract_site_notes_ct_export_underground_wifi_comms
- extract_inverters
- preserve_unmatched_hardware_as_editable_raw_text
- attach_warnings_and_rule_version
manual_edit_rules:
  hardware_fields_are_editable_textboxes: true
  hardware_fields_are_not_dropdowns: true
  parser_can_seed_blank_fields: true
  parser_can_update_parser_owned_fields: true
  parser_cannot_overwrite_manually_edited_hardware_without_confirmation: true
  preserve_imported_raw_evidence: true
  unmatched_hardware_goes_to_editable_hardware_textbox_not_internal_notes: true
  continue_scanning_unmatched_strings_for_metering_ct_export_underground_comms: true
